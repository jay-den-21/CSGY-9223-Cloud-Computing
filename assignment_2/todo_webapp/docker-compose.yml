version: "3.9"

services:
  web:
    build: .
    image: jaydenx21/todo-app:latest
    container_name: todo-flask
    ports:
      - "5001:5000"
    environment:
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      FLASK_ENV: production
      PORT: 5000
    depends_on:
      - mongo

  mongo:
    image: mongo:6
    container_name: todo-mongo
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: